name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive       # vendored bibtexparser, needed by the .bib tests
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test
